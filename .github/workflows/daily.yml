name: Daily Newsletter

on:
  schedule:
    - cron: "6 8 * * *"   # Every day at 8:06 AM GMT-4
  workflow_dispatch:      # <- 只需要在这里留一个，和 schedule 保持平级缩进

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Needed to push index.html to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate newsletter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate.js

      - name: Commit and push updated newsletter
        run: |
          git config user.name "Newsletter Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "📰 Daily newsletter update - $(date +'%Y-%m-%d')"
          git push
